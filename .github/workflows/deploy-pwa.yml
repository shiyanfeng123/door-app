name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Create dist directory if it doesn't exist
        run: mkdir -p dist
      - name: Build
        run: npm run build
      - name: List files before copy
        run: ls -la public/
      - name: Copy OneSignal Service Worker files to both root and door-app directory
        run: |
          # 复制到dist目录（会部署到/door-app/）
          cp -f public/OneSignalSDKWorker.js dist/
          cp -f public/OneSignalSDKExtensionWorker.js dist/
          # 创建根目录部署文件夹
          mkdir -p dist-root
          # 复制OneSignal文件到根目录
          cp -f public/OneSignalSDKWorker.js dist-root/
          cp -f public/OneSignalSDKExtensionWorker.js dist-root/
          ls -la dist/
          ls -la dist-root/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署子路径内容
          publish_dir: ./dist
          # 部署到door-app子目录
          destination_dir: door-app
      - name: Deploy OneSignal files to root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署根目录内容
          publish_dir: ./dist-root
          # 部署到根目录
          destination_dir: .