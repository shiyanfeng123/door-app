name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Create dist directory if it doesn't exist
        run: mkdir -p dist
      - name: Build
        run: npm run build
      - name: List files before copy
        run: ls -la public/
      - name: Prepare deployment directory
        run: |
          # 创建最终部署目录
          mkdir -p deploy
          # 复制项目文件到deploy/door-app/
          cp -r dist/* deploy/door-app/
          # 复制OneSignal文件到deploy/（根目录）
          cp -f public/OneSignalSDKWorker.js deploy/
          cp -f public/OneSignalSDKExtensionWorker.js deploy/
          # 查看部署目录结构
          ls -la deploy/
          ls -la deploy/door-app/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署完整的部署目录
          publish_dir: ./deploy
          # 部署到根目录
          destination_dir: .