<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dorr</title>
    <link rel="manifest" href="/door-app/manifest.json" />
    <link rel="apple-touch-icon" href="/door-app/icons/icon-192x192.png" />
    <meta name="theme-color" content="#4A90E2" />
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script type="module" crossorigin src="/door-app/assets/index-Df2sOM1f.js"></script>
    <link rel="stylesheet" crossorigin href="/door-app/assets/index-BNxhVLTb.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // OneSignal 初始化 - 安全配置，避免ServiceWorker错误
      // 在本地开发时完全禁用，生产环境使用正确路径
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        const isLocalhost = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' ||
                           window.location.hostname === '';
        
        // 如果是本地开发环境，不初始化OneSignal
        if (isLocalhost) {
          console.log('开发环境：跳过OneSignal初始化');
          return;
        }
        
        // 生产环境配置
        console.log('生产环境：初始化OneSignal');
        
        try {
          await OneSignal.init({
            appId: "8c37e53b-1be9-422f-8efc-a2440a4e51af",
            // 重要：设置正确的ServiceWorker路径
            serviceWorkerPath: '/door-app/OneSignalSDKWorker.js',
            serviceWorkerParam: {
              scope: '/door-app/'
            },
            // 开发环境允许HTTP
            allowLocalhostAsSecureOrigin: true,
            // 自动提示用户订阅
            promptOptions: {
              slidedown: {
                enabled: true,
                autoPrompt: true,
                timeDelay: 3,
                pageViews: 1
              }
            }
          });
          
          console.log('OneSignal初始化成功');
        } catch (error) {
          console.error('OneSignal初始化失败:', error);
        }
      });
    </script>
  </body>
</html>
