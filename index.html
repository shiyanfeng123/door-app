<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dorr</title>
    <link rel="manifest" href="/door-app/manifest.json" />
    <link rel="apple-touch-icon" href="/door-app/icons/icon-192x192.png" />
    <meta name="theme-color" content="#4A90E2" />
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script type="module" crossorigin src="/door-app/assets/index-DFsB7DmV.js"></script>
    <link rel="stylesheet" crossorigin href="/door-app/assets/index-BNxhVLTb.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 初始化 OneSignal
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "8c37e53b-1be9-422f-8efc-a2440a4e51af",
          serviceWorkerParam: {
            scope: '/door-app/'
          },
          serviceWorkerPath: '/door-app/OneSignalSDKWorker.js',
          serviceWorkerUpdaterPath: '/door-app/OneSignalSDKExtensionWorker.js',
          path: '/door-app/'
        });

        // 监听通知权限变化
        OneSignal.on('permissionChange', function(permissionChange) {
          var currentPermission = permissionChange.to;
          console.log('通知权限变化为:', currentPermission);
        });

        // 监听注册成功事件
        OneSignal.on('subscriptionChange', function(isSubscribed) {
          console.log('订阅状态变化为:', isSubscribed);
          if (isSubscribed) {
            OneSignal.getUserId().then(function(userId) {
              console.log("OneSignal User ID:", userId);
              // 保存此 ID，用于发送定向通知
            });
          }
        });

        // 尝试获取用户 ID
        OneSignal.getUserId().then(function(userId) {
          console.log("OneSignal User ID:", userId);
        });
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/door-app/service-worker.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
