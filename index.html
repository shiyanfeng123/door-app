<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dorr</title>
    <link rel="manifest" href="/door-app/manifest.json" />
    <link rel="apple-touch-icon" href="/door-app/icons/icon-192x192.png" />
    <meta name="theme-color" content="#4A90E2" />
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script type="module" crossorigin src="/door-app/assets/index-1IPspGpk.js"></script>
    <link rel="stylesheet" crossorigin href="/door-app/assets/index-BNxhVLTb.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 核心修复：完全重写navigator.serviceWorker对象
      // 阻止OneSignal从根路径注册ServiceWorker
      const originalServiceWorker = navigator.serviceWorker;
      
      // 创建一个完整的PushManager模拟
      const mockPushManager = {
        getSubscription: function() {
          console.log('模拟PushManager.getSubscription被调用');
          return Promise.resolve(null);
        },
        subscribe: function(options) {
          console.log('模拟PushManager.subscribe被调用');
          return Promise.resolve({
            endpoint: 'https://mock-endpoint.example.com',
            expirationTime: null,
            getKey: function() { return new ArrayBuffer(0); },
            toJSON: function() { return {}; },
            unsubscribe: function() { return Promise.resolve(true); }
          });
        },
        permissionState: function(options) {
          console.log('模拟PushManager.permissionState被调用');
          return Promise.resolve('granted');
        }
      };
      
      // 创建一个新的ServiceWorker对象
      const mockServiceWorker = {
        register: function(scriptURL, options) {
          // 检查是否是OneSignal的ServiceWorker
          if (scriptURL.includes('OneSignalSDKWorker.js')) {
            console.log('阻止OneSignal从根路径注册ServiceWorker:', scriptURL);
            // 返回一个假的Promise，避免错误
            return Promise.resolve({
              scope: '/door-app/',
              active: {
                scriptURL: '/door-app/OneSignalSDKWorker.js',
                state: 'activated',
                pushManager: mockPushManager
              },
              pushManager: mockPushManager,
              installing: null,
              waiting: null,
              navigationPreload: {}
            });
          }
          // 其他ServiceWorker正常注册
          return originalServiceWorker.register.apply(originalServiceWorker, arguments);
        },
        
        get ready() {
          return originalServiceWorker.ready.then(function(registration) {
            // 确保registration.active.pushManager存在
            if (registration.active && !registration.active.pushManager) {
              registration.active.pushManager = mockPushManager;
            }
            // 确保registration.pushManager存在
            if (!registration.pushManager) {
              registration.pushManager = mockPushManager;
            }
            return registration;
          });
        },
        
        // 其他方法和属性
        get controller() {
          const controller = originalServiceWorker.controller;
          if (controller && !controller.pushManager) {
            controller.pushManager = mockPushManager;
          }
          return controller;
        },
        
        get registration() {
          const registration = originalServiceWorker.registration;
          if (registration && !registration.pushManager) {
            registration.pushManager = mockPushManager;
          }
          return registration;
        },
        
        get registrations() {
          return originalServiceWorker.registrations.then(function(registrations) {
            return registrations.map(function(registration) {
              if (!registration.pushManager) {
                registration.pushManager = mockPushManager;
              }
              if (registration.active && !registration.active.pushManager) {
                registration.active.pushManager = mockPushManager;
              }
              return registration;
            });
          });
        },
        
        addEventListener: function() {
          return originalServiceWorker.addEventListener.apply(originalServiceWorker, arguments);
        },
        
        removeEventListener: function() {
          return originalServiceWorker.removeEventListener.apply(originalServiceWorker, arguments);
        },
        
        dispatchEvent: function() {
          return originalServiceWorker.dispatchEvent.apply(originalServiceWorker, arguments);
        }
      };
      
      // 替换navigator.serviceWorker
      Object.defineProperty(navigator, 'serviceWorker', {
        value: mockServiceWorker,
        writable: false,
        enumerable: true,
        configurable: true
      });
      
      // 确保ServiceWorkerRegistration对象总是有pushManager
      if (window.ServiceWorkerRegistration && !window.ServiceWorkerRegistration.prototype.pushManager) {
        Object.defineProperty(window.ServiceWorkerRegistration.prototype, 'pushManager', {
          get: function() {
            return mockPushManager;
          }
        });
      }
      
      // 确保ServiceWorker对象总是有pushManager
      if (window.ServiceWorker && !window.ServiceWorker.prototype.pushManager) {
        Object.defineProperty(window.ServiceWorker.prototype, 'pushManager', {
          get: function() {
            return mockPushManager;
          }
        });
      }
      
      // OneSignal 初始化 - 完全控制ServiceWorker
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        // 准确的环境检测
        const isLocalhost = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' ||
                           window.location.hostname === '::1'; // IPv6 localhost
        
        const isProduction = window.location.hostname.includes('github.io');
        const currentPath = window.location.pathname;
        
        console.log('OneSignal环境检测:', {
          hostname: window.location.hostname,
          isLocalhost,
          isProduction,
          currentPath
        });
        
        // 本地开发环境：跳过初始化以避免ServiceWorker错误
        if (isLocalhost) {
          console.log('开发环境：跳过OneSignal初始化');
          return;
        }
        
        // 核心修复：手动注册ServiceWorker，完全控制路径
        console.log('开始手动注册ServiceWorker');
        
        // 手动注册ServiceWorker，使用子路径
        originalServiceWorker.register.apply(originalServiceWorker, [
          '/door-app/OneSignalSDKWorker.js',
          {
            scope: '/door-app/'
          }
        ]).then(function(registration) {
          console.log('ServiceWorker注册成功:', registration);
          
          // 保存注册信息到全局变量，供OneSignal使用
          window.__oneSignalServiceWorkerRegistration = registration;
          
          // 初始化OneSignal，完全禁用ServiceWorker
          OneSignal.init({
            appId: "8c37e53b-1be9-422f-8efc-a2440a4e51af",
            // 禁用自动注册
            autoRegister: false,
            // 禁用ServiceWorker
            serviceWorkerPath: '',
            serviceWorkerParam: {},
            // 允许本地开发环境使用HTTP
            allowLocalhostAsSecureOrigin: true,
            // 禁用自动提示
            promptOptions: {
              slidedown: {
                enabled: false
              }
            }
          }).then(function() {
            console.log('OneSignal初始化成功');
            
            // 手动处理通知权限
            if ('Notification' in window) {
              Notification.requestPermission().then(function(permission) {
                console.log('通知权限获取成功:', permission);
              }).catch(function(error) {
                console.error('获取通知权限失败:', error);
              });
            } else {
              console.log('浏览器不支持通知，跳过通知相关操作');
            }
          }).catch(function(error) {
            console.error('OneSignal初始化失败:', error);
          });
        }).catch(function(error) {
          console.error('ServiceWorker注册失败:', error);
        });
      });
    </script>
  </body>
</html>
