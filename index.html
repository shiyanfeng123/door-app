<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dorr</title>
    <link rel="manifest" href="/door-app/manifest.json" />
    <link rel="apple-touch-icon" href="/door-app/icons/icon-192x192.png" />
    <meta name="theme-color" content="#4A90E2" />
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 核心修复：在OneSignal加载前重写navigator.serviceWorker.register方法
      // 阻止OneSignal从根路径注册ServiceWorker
      const originalRegister = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(scriptURL, options) {
        // 检查是否是OneSignal的ServiceWorker
        if (scriptURL.includes('OneSignalSDKWorker.js')) {
          console.log('阻止OneSignal从根路径注册ServiceWorker:', scriptURL);
          // 返回一个假的Promise，避免错误
          return Promise.resolve({
            scope: '/door-app/',
            active: {
              scriptURL: '/door-app/OneSignalSDKWorker.js',
              state: 'activated'
            }
          });
        }
        // 其他ServiceWorker正常注册
        return originalRegister.apply(navigator.serviceWorker, arguments);
      };
      
      // OneSignal 初始化 - 完全控制ServiceWorker
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        // 准确的环境检测
        const isLocalhost = window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' ||
                           window.location.hostname === '::1'; // IPv6 localhost
        
        const isProduction = window.location.hostname.includes('github.io');
        const currentPath = window.location.pathname;
        
        console.log('OneSignal环境检测:', {
          hostname: window.location.hostname,
          isLocalhost,
          isProduction,
          currentPath
        });
        
        // 本地开发环境：跳过初始化以避免ServiceWorker错误
        if (isLocalhost) {
          console.log('开发环境：跳过OneSignal初始化');
          return;
        }
        
        try {
          // 核心修复：手动注册ServiceWorker，完全控制路径
          console.log('开始手动注册ServiceWorker');
          
          // 手动注册ServiceWorker，使用子路径
          const registration = await originalRegister(
            '/door-app/OneSignalSDKWorker.js',
            {
              scope: '/door-app/'
            }
          );
          
          console.log('ServiceWorker注册成功:', registration);
          
          // 保存注册信息到全局变量，供OneSignal使用
          window.__oneSignalServiceWorkerRegistration = registration;
          
          // 重写OneSignal的ServiceWorker注册方法，完全阻止它
          const originalRegisterForPush = OneSignal.registerForPushNotifications;
          OneSignal.registerForPushNotifications = function(options) {
            console.log('OneSignal注册被阻止，使用手动注册的ServiceWorker');
            return Promise.resolve();
          };
          
          // 初始化OneSignal，禁用所有ServiceWorker相关选项
          await OneSignal.init({
            appId: "8c37e53b-1be9-422f-8efc-a2440a4e51af",
            // 禁用自动注册
            autoRegister: false,
            // 禁用ServiceWorker自动注册
            serviceWorkerPath: '/door-app/OneSignalSDKWorker.js',
            serviceWorkerParam: {
              scope: '/door-app/'
            },
            // 允许本地开发环境使用HTTP
            allowLocalhostAsSecureOrigin: true,
            // 自动提示用户订阅
            promptOptions: {
              slidedown: {
                enabled: true,
                autoPrompt: true,
                timeDelay: 3,
                pageViews: 1
              }
            }
          });
          
          // 通知OneSignal使用我们手动注册的ServiceWorker
          console.log('设置OneSignal使用手动注册的ServiceWorker');
          await OneSignal.setServiceWorker(registration);
          
          console.log('OneSignal初始化成功');
          
          // 现在请求通知权限
          const permission = await OneSignal.Notifications.requestPermission();
          console.log('通知权限获取成功:', permission);
          
          // 监听通知权限变化
          OneSignal.on('permissionChange', function(permissionChange) {
            var currentPermission = permissionChange.to;
            console.log('通知权限变化为:', currentPermission);
          });

          // 监听注册成功事件
          OneSignal.on('subscriptionChange', function(isSubscribed) {
            console.log('订阅状态变化为:', isSubscribed);
            if (isSubscribed) {
              OneSignal.getUserId().then(function(userId) {
                console.log("OneSignal User ID:", userId);
                // 保存此 ID，用于发送定向通知
              });
            }
          });

          // 尝试获取用户 ID
          OneSignal.getUserId().then(function(userId) {
            console.log("OneSignal User ID:", userId);
          });
        } catch (error) {
          console.error('OneSignal初始化失败:', error);
        }
      });
    </script>
  </body>
</html>
